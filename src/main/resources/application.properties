spring.application.name=prajaconnect

# Database Configuration
# For production, these will be set as environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/prajaconnect_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Akhila_11}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8080}

# JWT Configuration
prajaconnect.app.jwtSecret=${JWT_SECRET:PrajaConnectSecretKeyForJwtAuthenticationWhichShouldBeLongEnoughToWorkWithHS256AlgorithmAndThenSomeMore}
prajaconnect.app.jwtExpirationMs=86400000

# File Upload Configuration
file.upload-dir=uploads
